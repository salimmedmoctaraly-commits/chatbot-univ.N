  utter_demander_rachat_passage_ar:
    - text: |
        معايير الاسترداد للانتقال 2024-2025:
        الشروط الأساسية:
           • لا يطبق إلا على فصل واحد وعنصر واحد
           • العنصر المراد استرداده ≥ 6/20
        L1→L2: 39 رصيداً (S1+S2) + معدل ≥ 9.8 → يُرفع إلى 10
        L2→L3:
           • الحالة 1 (L1 غير متحقق): تحقق S3+S4 أو 39 رصيداً بمعدل 10
           • الحالة 2 (L1 متحقق): رصيد S3+S4 ≥ 39 ومعدل ≥ 9.8 → يُرفع إلى 10

  utter_demander_rachat_passage_fr:
    - text: |
        Critères de rachat de passage 2024-2025:
        Conditions de base:
           • S'applique sur 1 semestre et 1 élément seulement
           • Note de l'élément à racheter ≥ 6/20
        L1→L2: 39 crédits (S1+S2) + moyenne ≥ 9,8 → ramenée à 10
        L2→L3:
           • Cas 1 (L1 non validé): validation S3+S4 ou 39 crédits avec moyenne 10
           • Cas 2 (L1 validé): crédits S3+S4 ≥ 39 et moyenne ≥ 9,8 → ramenée à 10

  utter_demander_rachat_diplome_ar:
    - text: |
        معايير الاسترداد للشهادة 2024-2025:
        الشروط الأساسية:
           • فصل واحد وعنصر واحد فقط | العنصر ≥ 5/20
           • معدل الفصل غير المتحقق ≥ 9.5
           • لا عنصر بعلامة نهائية < 6 | لا مقياس بمعدل < 9
           • مقياس متعدد العناصر: ≥ 7.5 → الاسترداد ممكن
           • مقياس وحيد العنصر: ≥ 7 → نفس الشرط

  utter_demander_rachat_diplome_fr:
    - text: |
        Critères de rachat de diplôme 2024-2025:
        Conditions de base:
           • 1 semestre et 1 élément seulement | élément ≥ 5/20
           • Moy. semestre non validé ≥ 9,5
           • Aucun élément < 6 | aucun module < 9
           • Module multi-éléments: moy. ≥ 7,5 → rachetable
           • Module mono-élément: moy. ≥ 7 → même condition

  utter_demander_reglement_examens_ar:
    - text: |
        اللائحة الداخلية للامتحانات:
        ✅ وثائق إلزامية (أصليات فقط):
           • شهادة التسجيل + بطاقة الطالب + هوية وطنية + صورة
           ⚠️ النسخ المصادق عليها غير مقبولة!
        ❌ محظور: الحقائب، أوراق الغش، الهواتف، السماعات، الساعات الذكية


  utter_demander_reglement_examens_fr:
    - text: |
        Règlement intérieur des examens:
        ✅ Documents obligatoires (originaux uniquement):
           • Attestation + carte étudiant + CIN + photo
           ⚠️ Les copies légalisées ne sont pas acceptées!
        ❌ Interdits: sacs, antisèches, téléphones, écouteurs, montres connectées


  utter_demander_types_exclusion_ar:
    - text: |
        أنواع الإقصاء في الامتحانات:
        • تبادل لفظي → إنذار من العميد
        • غياب الهوية (أصلي) → صفر للعنصر
        • استخدام أوراق غش → صفر للعنصر
        • استخدام وسائل تكنولوجية → صفر للدورة
        • حيازة تكنولوجيا المعلومات → صفر للوحدة
        • اسم وهمي ورقم الطالب → صفر في الدورة
        • انتحال شخصية → صفر في الدورة/الفصل

  utter_demander_types_exclusion_fr:
    - text: |
        Types d'exclusion aux examens:
        • Échange verbal → Avertissement du Doyen
        • Absence de pièce d'identité (originale) → Zéro pour l'élément
        • Utilisation d'antisèches → Zéro pour l'élément
        • Utilisation de moyens technologiques → Zéro pour la session
        • Possession de TIC → Zéro pour l'unité
        • Faux nom et numéro étudiant → Zéro dans la session
        • Substitution d'étudiant → Zéro dans la session/semestre

  utter_demander_reclamation_ar:
    - text: |
        قواعد الشكاوى:
        الشكوى = علامة ضاعت لأسباب إدارية أو طبية (ليست عدم رضا)
        • TP: اتصل بالأستاذ والمنسق فوراً
        • الامتحانات: لا تعويض عن الغياب في CF
        🔗 http://resultats.una.mr/FST/index.jsp (خلال 3 أيام)

  utter_demander_reclamation_fr:
    - text: |
        Règles de réclamation:
        Réclamation = note perdue pour raison administrative/médicale
        • TP: contacter l'enseignant et coordinateur immédiatement
        • Examens: aucun remplacement pour absence au CF
        🔗 http://resultats.una.mr/FST/index.jsp (pendant 3 jours)

  utter_demander_systeme_LMD_ar:
    - text: |
        نظام LMD (ليسانس – ماستر – دكتوراه):
        ليسانس: 3 سنوات | 6 فصول | 180 رصيداً
        ماستر: سنتان (Bac+5) | 4 فصول | 120 رصيداً
        دكتوراه: 3 سنوات بعد الماستر (Bac+8)
    - text: |
        🎓 **مستويات نظام ل م د:**
        الليسانس (ل):
        3 سنوات بعد الباكالوريا
        6 سداسيات — 180 رصيداً
        نوعان: أساسي (للدراسات العليا) ومهني (للاندماج المهني)
        الماستر (م):
        سنتان بعد الليسانس (باك + 5)
        4 سداسيات — 120 رصيداً
        نوعان: ماستر بحث وماستر مهني
        الدكتوراه (د):
        3 سنوات بعد الماستر (باك + 8)

  utter_demander_systeme_LMD_fr:
    - text: |
        Système LMD (Licence – Master – Doctorat):
        Licence: 3 ans | 6 semestres | 180 crédits
        Master: 2 ans (Bac+5) | 4 semestres | 120 crédits
        Doctorat: 3 ans après le Master (Bac+8)
    - text: |
        🎓 **Niveaux du système LMD :**
        Licence (L) :
        3 ans après le Bac
        6 semestres — 180 crédits
        Fondamentale (poursuite d'études) ou Appliquée (insertion professionnelle)
        Master (M) :
        2 ans après la Licence (Bac+5)
        4 semestres — 120 crédits
        Master de recherche ou Master professionnel
        Doctorat (D) :
        3 ans après le Master (Bac+8)

  utter_demander_organisation_LMD_ar:
    - text: |
        تنظيم LMD:
        الهرم: فيليار → فصل → مقياس (1-3 عناصر) → رصيد
        الفصل: 16 أسبوعاً | 5 مقاييس كحد أقصى | 30 رصيداً
        التسجيل: إداري + بيداغوجي (إلزامي كل فصل)
        لا تسجيل بعد انتهاء الآجال
    - text: |
        📚 **تنظيم الدراسة في نظام ل م د:**
        الشعبة:
        مسار تكوين يضم وحدات متجانسة تنتمي لحقل أو عدة حقول معرفية
        السداسي:
        فترة زمنية تمتد 16 أسبوعاً
        لا يزيد على 5 وحدات تمثل 30 رصيداً
        السنة الجامعية = سداسيان
        الوحدة:
        المكون الأساسي للتكوين
        تتشكل من 1 إلى 3 عناصر متجانسة
        العنصر:
        دروس نظرية أو أعمال تطبيقية أو أعمال ميدانية أو مشاريع أو تدريب
        الرصيد:
        وحدة قياس تمكن من تحديد حجم العمل المطلوب للتكوين

  utter_demander_organisation_LMD_fr:
    - text: |
        Organisation du LMD:
        Hiérarchie: Filière → Semestre → Module (1-3 éléments) → Crédit
        Semestre: 16 semaines | max 5 modules | 30 crédits
        Inscription: Administrative + Pédagogique (obligatoire chaque semestre)
        Aucune inscription hors délai acceptée
    - text: |
        📚 **Organisation des études LMD :**
        Filière :
        Cursus composé d'un ensemble cohérent de modules appartenant à un ou plusieurs champs disciplinaires
        Semestre :
        16 semaines d'enseignement et d'évaluation
        Maximum 5 modules représentant 30 crédits
        Une année universitaire comprend deux semestres
        Module :
        Structure de base du système LMD
        Comporte entre 1 et 3 éléments cohérents
        Élément de module :
        Cours théorique et/ou TD et/ou TP et/ou activité pratique ou stage
        Crédit :
        Unité de mesure pour quantifier la charge de travail requise des étudiants

  utter_demander_progression_licence_ar:
    - text: |
        قواعد الانتقال في الليسانس:
        التعويض:
        المقياس متحقق إذا كان معدل عناصره ≥ 10/20
        الفصل متحقق إذا كان معدل مقاييسه ≥ 10/20
        الانتقال:
        داخل السنة: تلقائي
        L1→L2: 39 رصيداً (S1+S2) + معدل سنوي ≥ 10
        L2→L3: معدل ≥ 10 + 99 رصيداً (S1-S4)
    - text: |
        📈 **قواعد الانتقال في مرحلة الليسانس:**
        للحصول على الليسانس: 180 رصيداً
        الانتقال من سداسي لآخر في نفس السنة: تلقائي
        من السنة 1 إلى السنة 2:
        استيفاء 39 رصيداً على الأقل (S1+S2)
        معدل سنوي ≥ 10/20 عن طريق المعاوضة
        من السنة 2 إلى السنة 3:
        معدل سنوي ≥ 10/20 عن طريق المعاوضة
        استيفاء 99 رصيداً على الأقل (S1 إلى S4)
        التحقق من S1 و S2
        الطالب يحتفظ بنتائج العناصر والوحدات المستوفاة
        يعيد التسجيل إجبارياً في العناصر غير المستوفاة
        لا يمكن التسجيل في أكثر من 30 رصيداً في السداسي الواحد

  utter_demander_progression_licence_fr:
    - text: |
        Règles de progression en Licence:
        Compensation:
        Module validé si moyenne éléments ≥ 10/20
        Semestre validé si moyenne modules ≥ 10/20
        Passage:
        Intra-année: automatique
        L1→L2: 39 crédits (S1+S2) + moyenne annuelle ≥ 10
        L2→L3: note ≥ 10 + 99 crédits (S1-S4)
    - text: |
        📈 **Règles de progression — Licence :**
        Pour obtenir la Licence : 180 crédits
        Passage d'un semestre à l'autre dans la même année : automatique
        Passage de L1 à L2 :
        Validation d'au moins 39 crédits entre S1 et S2
        Moyenne annuelle ≥ 10/20 par compensation entre tous les modules
        Passage de L2 à L3 :
        Moyenne annuelle ≥ 10/20 par compensation
        Validation d'au moins 99 crédits entre S1, S2, S3 et S4
        Validation de S1 et S2
        Les éléments capitalisés et modules validés sont conservés définitivement
        L'étudiant reprend obligatoirement les éléments non acquis
        Maximum 30 crédits par semestre (sauf dérogation)

  utter_demander_progression_master_ar:
    - text: |
        قواعد الانتقال في الماستر:
        S1→S2: تلقائي
        M1→M2: علامة ≥ 10 في جميع الوحدات أو معدل عام ≥ 10
        S3→S4: 90 رصيداً متحققاً
        مذكرة غير مناقشة: تمديد استثنائي ≤ 6 أشهر
    - text: |
        📈 **قواعد الانتقال في مرحلة الماستر:**
        للحصول على الماستر: 120 رصيداً
        الانتقال من السداسي 1 إلى السداسي 2: تلقائي
        من السنة 1 إلى السنة 2:
        معدل ≥ 10/20 في جميع وحدات التكوين
        أو معدل سنوي ≥ 10/20 بالمعاوضة بين جميع وحدات التكوين
        الانتقال من السداسي 3 إلى السداسي 4:
        تحصيل 90 رصيداً
        الطالب يحتفظ بنتائج العناصر والوحدات المستوفاة
        الطلبة الذين لم يناقشوا يمكنهم الاستفادة من تمديد استثنائي لا يزيد على 6 أشهر

  utter_demander_progression_master_fr:
    - text: |
        Règles de progression en Master:
        S1→S2: automatique
        M1→M2: note ≥ 10 dans toutes les unités OU moyenne générale ≥ 10
        S3→S4: 90 crédits validés
        Mémoire non soutenu: prorogation exceptionnelle ≤ 6 mois
    - text: |
        📈 **Règles de progression — Master :**
        Pour obtenir le Master : 120 crédits
        Passage du S1 au S2 : automatique
        Passage de M1 à M2 :
        Note ≥ 10/20 dans tous les modules
        ou Moyenne annuelle générale ≥ 10/20 par compensation
        Passage du S3 au S4 :
        Validation de 90 crédits
        Les éléments capitalisés et modules validés sont conservés définitivement
        Les étudiants n'ayant pas soutenu peuvent bénéficier d'une prorogation exceptionnelle de 6 mois maximum

  utter_demander_regles_exclusion_LMD_ar:
    - text: |
        قواعد الإقصاء في نظام LMD:
        الطالب الذي يرسب لمدة أكثر من سنتين في نفس المستوى يُقصى
        الطالب الذي يتجاوز الحد الأقصى للتسجيل يُقصى
        في حالة الغش المثبت: إقصاء من الدورة الامتحانية
    - text: |
        🚫 **قواعد الطرد:**
        لا يمكن للطالب التسجيل أكثر من مرتين في نفس الوحدة (ليسانس أو ماستر)
        الليسانس:
        يستفيد الطالب من 3 سداسيات احتياط
        يمكن الحصول على ترخيص استثنائي
        الماستر:
        يستفيد الطالب من 2 سداسيات احتياط
        يمكن الحصول على ترخيص استثنائي

  utter_demander_regles_exclusion_LMD_fr:
    - text: |
        Règles d'exclusion dans le système LMD:
        L'étudiant qui échoue pendant plus de 2 ans au même niveau est exclu
        L'étudiant qui dépasse le nombre maximum d'inscriptions est exclu
        En cas de fraude prouvée: exclusion de la session d'examen
    - text: |
        🚫 **Règles d'exclusion :**
        L'étudiant s'inscrit au maximum deux fois à un même module en Licence ou en Master
        Licence :
        L'étudiant a droit à 3 semestres de réserve
        Il peut bénéficier d'une dérogation
        Master :
        L'étudiant a droit à 2 semestres de réserve
        Il peut bénéficier d'une dérogation

  utter_demander_evaluation_LMD_ar:
    - text: |
        نظام التقييم في LMD:
        CC (مراقبة مستمرة): 40%
        CF (امتحان نهائي): 60%
        TP (أعمال تطبيقية): يُحسب ضمن CC أو بشكل منفصل
        العتبة الدنيا للعنصر حسب المقياس
    - text: |
        📊 **قواعد تقويم المعارف:**
        يتم التقويم عبر:
        المراقبة المستمرة (الاختبارات)
        الامتحانات الفصلية النهائية
        الأعمال التطبيقية
        نظام مزدوج يجمع بين المراقبة المستمرة والامتحانات
        دورة واحدة تكميلية فقط
        في حالة الغياب عن الامتحانات لا يقبل أي مبرر
        للأعمال التطبيقية: تقديم مبرر خلال 72 ساعة
        في حالة الغش: الإنذار، التوبيخ، إلغاء النتيجة، الطرد المؤقت أو النهائي

  utter_demander_evaluation_LMD_fr:
    - text: |
        Système d'évaluation dans le LMD:
        CC (Contrôle Continu): 40%
        CF (Contrôle Final): 60%
        TP (Travaux Pratiques): comptabilisé dans le CC ou séparément
        Seuil minimal par élément selon le module
    - text: |
        📊 **Règles d'évaluation des connaissances :**
        L'évaluation s'effectue sous forme de :
        Contrôle continu (examens)
        Examens semestriels finaux
        Travaux pratiques
        Régime mixte avec une seule session de rattrapage
        En cas d'absence aux examens : aucun justificatif accepté
        Pour les TP : justificatif médical dans un délai de 72 heures
        En cas de fraude : avertissement, blâme, nullité de l'élément/module, exclusion provisoire ou définitive

  utter_conditions_acces_licence_ar:
    - text: |
        📋 **شروط القبول في مرحلة الليسانس:**
        الولوج مفتوح أمام الحاصلين على شهادة الباكالوريا
        أو شهادة تعادلها معترف بها
        بشرط توفر معايير القبول المحددة في عرض التكوين

  utter_conditions_acces_master_ar:
    - text: |
        📋 **شروط القبول في مرحلة الماستر:**
        مفتوح أمام الحاصلين على شهادة الليسانس أو ما يعادلها
        القبول يتم بعد انتقاء الملفات وفق عدد المقاعد المتاحة

  utter_conditions_acces_fr:
    - text: |
        📋 **Conditions d'accès :**
        Licence :
        Titulaires du baccalauréat ou titre reconnu équivalent
        Satisfaisant aux critères d'admission de l'offre de formation
        Master :
        Titulaires d'un diplôme de licence ou titre reconnu équivalent
        Sélection sur dossiers selon le nombre de places ouvertes

  utter_compensation_licence_ar:
    - text: |
        ⚖️ **قواعد المعاوضة في مرحلة الليسانس:**
        استيفاء الوحدة:
        علامة ≥ 10/20 أو بالمعاوضة بين عناصرها
        دون أن تقل أي علامة عنصر عن العتبة المحددة من المؤسسة
        استيفاء السداسي:
        معدل جميع وحداته ≥ 10/20
        دون أن تقل علامة أي وحدة عن 9/20
        ودون أن تقل أي علامة عنصر عن العتبة المحددة

  utter_compensation_licence_fr:
    - text: |
        ⚖️ **Compensation — Licence :**
        Validation d'un module :
        Note ≥ 10/20 ou par compensation entre ses éléments
        Aucune note d'élément inférieure au seuil fixé par l'établissement
        Validation d'un semestre :
        Moyenne de tous les modules ≥ 10/20
        Aucune note de module inférieure à 9/20
        Aucune note d'élément inférieure au seuil fixé par l'établissement

  utter_compensation_master_ar:
    - text: |
        ⚖️ **قواعد المعاوضة في مرحلة الماستر:**
        استيفاء الوحدة:
        علامة ≥ 10/20 أو بالمعاوضة بين عناصرها
        دون أن تقل أي علامة عنصر عن العتبة المحددة من المؤسسة
        استيفاء السداسي:
        معدل جميع وحداته ≥ 10/20
        دون أن تقل علامة أي وحدة عن العتبة المحددة
        ودون أي علامة عنصر أدنى من العتبة المحددة

  utter_compensation_master_fr:
    - text: |
        ⚖️ **Compensation — Master :**
        Validation d'un module :
        Note ≥ 10/20 ou compensation entre ses éléments
        Aucune note d'élément inférieure au seuil fixé par l'établissement
        Validation d'un semestre :
        Moyenne de tous les modules ≥ 10/20
        Aucune note de module inférieure au seuil fixé
        Aucune note d'élément inférieure au seuil fixé

  utter_licence_fondamentale_ar:
    - text: |
        📖 **الليسانس الأساسي (Fondamentale):**
        تكوين نظري وأكاديمي عميق
        الهدف: مواصلة الدراسات العليا (ماستر، دكتوراه)
        يركز على البحث والتحليل والمعرفة النظرية
        مسار: ليسانس → ماستر بحث → دكتوراه

  utter_licence_professionnelle_ar:
    - text: |
        🛠️ **الليسانس المهني (Professionnelle):**
        تكوين تطبيقي وعملي
        الهدف: الاندماج المباشر في سوق الشغل
        يركز على المهارات المهنية والتدريب الميداني
        مسار: ليسانس → حياة مهنية

  utter_master_recherche_ar:
    - text: |
        🔬 **ماستر البحث (Recherche):**
        يُعدّ الطالب للبحث العلمي والدكتوراه
        يتضمن مذكرة بحث أكاديمية عميقة
        التقييم: مقاييس نظرية + مذكرة بحث
        المسار بعده: دكتوراه (Bac+8)
        المستهدف: من يريد التعمق الأكاديمي والتدريس الجامعي

  utter_master_professionnel_ar:
    - text: |
        💼 **الماستر المهني (Professionnel):**
        يعدّ الطالب لسوق العمل مباشرة
        يتضمن تدريباً ميدانياً في مؤسسة
        التقييم: مقاييس تطبيقية + تقرير تدريب
        المسار بعده: الحياة المهنية
        المستهدف: من يريد الاندماج السريع في سوق الشغل

  utter_licence_fondamentale_fr:
    - text: |
        📖 **Licence Fondamentale :**
        Formation théorique et académique approfondie
        Objectif : poursuite des études supérieures (Master, Doctorat)
        Axée sur la recherche, l'analyse et les connaissances théoriques
        Parcours : Licence → Master Recherche → Doctorat

  utter_licence_professionnelle_fr:
    - text: |
        🛠️ **Licence Professionnelle / Appliquée :**
        Formation pratique et appliquée
        Objectif : insertion directe dans le marché du travail
        Axée sur les compétences professionnelles et les stages
        Parcours : Licence → Vie professionnelle

  utter_master_recherche_fr:
    - text: |
        🔬 **Master Recherche :**
        Prépare l'étudiant à la recherche scientifique et au Doctorat
        Comprend un mémoire de recherche académique approfondi
        Évaluation : modules théoriques + mémoire de recherche
        Parcours après : Doctorat (Bac+8)
        Destiné à : ceux qui souhaitent approfondir leurs connaissances et enseigner

  utter_master_professionnel_fr:
    - text: |
        💼 **Master Professionnel :**
        Prépare l'étudiant directement au marché du travail
        Comprend un stage en entreprise
        Évaluation : modules appliqués + rapport de stage
        Parcours après : vie professionnelle
        Destiné à : ceux qui souhaitent une insertion rapide dans le monde du travail

  utter_comparaison_recherche_professionnel_ar:
    - text: |
        ⚖️ **مقارنة: ماستر بحث vs ماستر مهني**
        الهدف:
        بحث: الدكتوراه والبحث العلمي
        مهني: سوق الشغل المباشر
        المذكرة:
        بحث: مذكرة بحث أكاديمية عميقة
        مهني: تقرير تدريب ميداني
        التكوين:
        بحث: نظري وتحليلي
        مهني: تطبيقي وعملي
        المسار بعده:
        بحث: دكتوراه (Bac+8)
        مهني: الحياة المهنية
        المستهدف:
        بحث: الباحثون والأكاديميون
        مهني: المهنيون وأصحاب العمل

  utter_comparaison_recherche_professionnel_fr:
    - text: |
        ⚖️ **Comparaison : Master Recherche vs Master Professionnel**
        Objectif :
        Recherche : Doctorat et recherche scientifique
        Professionnel : Marché du travail direct
        Mémoire :
        Recherche : Mémoire académique approfondi
        Professionnel : Rapport de stage en entreprise
        Formation :
        Recherche : Théorique et analytique
        Professionnel : Appliquée et pratique
        Parcours après :
        Recherche : Doctorat (Bac+8)
        Professionnel : Vie professionnelle
        Destiné à :
        Recherche : Chercheurs et académiciens
        Professionnel : Professionnels et employeurs

  utter_comparaison_licence_ar:
    - text: |
        ⚖️ **مقارنة: ليسانس أساسي vs ليسانس مهني**
        الهدف:
        أساسي: مواصلة الدراسات العليا
        مهني: الاندماج في سوق الشغل
        التكوين:
        أساسي: نظري وأكاديمي
        مهني: تطبيقي وميداني
        المسار بعده:
        أساسي: ماستر → دكتوراه
        مهني: حياة مهنية مباشرة
        التدريب:
        أساسي: محدود أو غير إلزامي
        مهني: إلزامي وأساسي

  utter_comparaison_licence_fr:
    - text: |
        ⚖️ **Comparaison : Licence Fondamentale vs Licence Professionnelle**
        Objectif :
        Fondamentale : Poursuite des études supérieures
        Professionnelle : Insertion dans le marché du travail
        Formation :
        Fondamentale : Théorique et académique
        Professionnelle : Appliquée et pratique
        Parcours après :
        Fondamentale : Master → Doctorat
        Professionnelle : Vie professionnelle directe
        Stage :
        Fondamentale : Limité ou non obligatoire
        Professionnelle : Obligatoire et fondamental

  utter_demander_resultats_fst_ar:
    - text: |
        طريقة الاطلاع على نتائج الامتحانات:
        1️⃣ افتح الرابط: https://resultats.univ-nkc.mr
        2️⃣️اختر كليتك من القائمة (FST / FLSH / FMPOS / FSJP / FEG)
        3️⃣ أدخل رقم التسجيل (Matricule)
        4️⃣ اضغط زر 'ادخل ENTRER'
        5️⃣ يظهر اسمك وشعبتك تلقائياً
        6️⃣ اختر الفصل من القائمة
        7️⃣ اضغط على تبويب 'Résultats CC / نتائج الاختبار'

  utter_demander_resultats_fst_fr:
    - text: |
        Comment consulter vos résultats d'examens:
          1️⃣ Ouvrir le lien: https://resultats.univ-nkc.mr
          2️⃣ Choisir votre faculté (FST / FLSH / FMPOS / FSJP / FEG)
          3️⃣ Entrer votre Matricule
          4️⃣ Cliquer sur 'ENTRER ادخل'
          5️⃣ Votre nom et filière s'affichent automatiquement
          6️⃣ Choisir le semestre dans la liste
          7️⃣ Cliquer sur l'onglet 'Résultats CC'


