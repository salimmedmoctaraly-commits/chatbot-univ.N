        🔭 Perspectives d'avenir:
        • Gestion de l'environnement et de la biodiversité
        • Recherche scientifique en écologie
        • Parcs et réserves naturelles
        • Contrôle qualité des eaux et des milieux naturels

  utter_description_NS_ar:
    - text: |
        🥗 تخصص NS — التغذية والصحة

        تخصص متعدد التخصصات يجمع بين علوم الغذاء والصحة العامة.
        يدرس العلاقة بين التغذية والصحة، وأمراض سوء التغذية،
        والأمن الغذائي، وأساليب مراقبة جودة الغذاء.

        🔭 الآفاق المستقبلية:
        • الصناعة الغذائية والزراعية
        • الصحة العامة والمجتمعية
        • المستشفيات ومراكز الصحة
        • البحث في التغذية والسلامة الغذائية

  utter_description_NS_fr:
    - text: |
        🥗 Spécialité NS — Nutrition et Santé

        Formation pluridisciplinaire qui combine les sciences
        alimentaires et la santé publique. Elle étudie la relation
        entre alimentation et santé, les maladies nutritionnelles,
        la sécurité alimentaire et le contrôle qualité des aliments.

        🔭 Perspectives d'avenir:
        • Industries agro-alimentaires
        • Santé publique et communautaire
        • Hôpitaux et centres de santé
        • Recherche en nutrition et sécurité alimentaire

  utter_description_TASSMQ_ar:
    - text: |
        🏭 تخصص TAS-SMQ — تكنولوجيا الأغذية وأنظمة إدارة الجودة

        تخصص مهني يجمع بين علوم وتكنولوجيا الأغذية ونظم
        إدارة الجودة. يركز على تحليل الأغذية، ضمان السلامة
        الغذائية، معايير ISO، HACCP، والتحكم في جودة الإنتاج.

        🔭 الآفاق المستقبلية:
        • مراقبة الجودة في الصناعة الغذائية
        • مختبرات التحليل الغذائي
        • الهيئات التنظيمية والسلامة الغذائية
        • البحث والتطوير في صناعة الأغذية

  utter_description_TASSMQ_fr:
    - text: |
        🏭 Spécialité TAS-SMQ — Technologie Alimentaire et Système de Management de la Qualité

        Formation professionnelle combinant les sciences et technologies
        alimentaires avec les systèmes de management de la qualité.
        Se concentre sur l'analyse des aliments, la sécurité sanitaire,
        les normes ISO, HACCP et le contrôle qualité de la production.

        🔭 Perspectives d'avenir:
        • Contrôle qualité dans l'industrie alimentaire
        • Laboratoires d'analyse alimentaire
        • Organismes de réglementation et sécurité alimentaire
        • Recherche et développement dans l'agro-alimentaire

  utter_description_IPG_ar:
    - text: |
        ⛽ تخصص IPG — هندسة البترول والغاز

        تخصص تطبيقي يجمع بين الجيولوجيا والهندسة الكيميائية
        لدراسة استكشاف واستخراج وتكرير النفط والغاز الطبيعي.
        يشمل: الجيوفيزياء، الكيمياء الهيدروكربونية، والهيدرولوجيا.

        🔭 الآفاق المستقبلية:
        • شركات البترول والغاز الطبيعي
        • استكشاف الموارد الطبيعية
        • مختبرات التحليل الجيوكيميائي
        • الطاقة والصناعات الاستخراجية

  utter_description_IPG_fr:
    - text: |
        ⛽ Spécialité IPG — Ingénierie Pétrole et Gaz

        Formation appliquée combinant géologie et génie chimique
        pour l'étude de l'exploration, de l'extraction et du
        raffinage du pétrole et du gaz naturel. Inclut la
        géophysique, la chimie des hydrocarbures et l'hydrologie.

        🔭 Perspectives d'avenir:
        • Compagnies pétrolières et gazières
        • Exploration des ressources naturelles
        • Laboratoires d'analyse géochimique
        • Industries énergétiques et extractives

  utter_description_GEOSS_ar:
    - text: |
        🪨 تخصص GEOSS — علوم الأرض (الجيوعلوم)

        تخصص يدرس بنية الأرض وتطورها عبر الزمن الجيولوجي.
        يشمل: الجيولوجيا الإقليمية، الجيومورفولوجيا، الاستشعار
        عن بعد، الجيوديناميكية، والموارد الطبيعية.

        🔭 الآفاق المستقبلية:
        • استكشاف الموارد المعدنية
        • إدارة الكوارث الطبيعية
        • الدراسات البيئية والجغرافية
        • البحث الجيولوجي الأكاديمي

  utter_description_GEOSS_fr:
    - text: |
        🪨 Spécialité GEOSS — Géosciences

        Spécialité qui étudie la structure et l'évolution de la
        Terre à travers le temps géologique. Couvre la géologie
        régionale, la géomorphologie, la télédétection, la
        géodynamique et les ressources naturelles.

        🔭 Perspectives d'avenir:
        • Exploration des ressources minérales
        • Gestion des risques naturels
        • Études environnementales et géographiques
        • Recherche géologique académique

  utter_description_GEOMIN_ar:
    - text: |
        ⛏️ تخصص GEOMIN — الجيولوجيا المنجمية

        تخصص تطبيقي يركز على الجيولوجيا التطبيقية في مجال
        التعدين. يدرس: البحث عن المعادن، طرق الاستخراج،
        الجيوإحصاء، الجيوفيزياء التطبيقية، وتقييم الرواسب.

        🔭 الآفاق المستقبلية:
        • شركات التعدين واستخراج المعادن
        • الدراسات والاستكشاف الجيولوجي
        • الهيئات الحكومية المعنية بالتعدين
        • إدارة الموارد المعدنية

  utter_description_GEOMIN_fr:
    - text: |
        ⛏️ Spécialité GEOMIN — Géologie Minière

        Formation appliquée axée sur la géologie dans le domaine
        minier. Étudie la prospection minière, les méthodes
        d'extraction, la géostatistique, la géophysique appliquée
        et l'évaluation des gisements minéraux.

        🔭 Perspectives d'avenir:
        • Compagnies minières et extractives
        • Études et prospection géologique
        • Organismes gouvernementaux du secteur minier
        • Gestion des ressources minérales

  utter_description_PEPE_ar:
    - text: |
        💧 تخصص PEPE (2P2E) — إنتاج وتوزيع مياه الشرب

        تخصص مهني يدرس كيمياء المياه، الميكروبيولوجيا المائية،
        الهيدروليك، تقنيات معالجة المياه، وشبكات التصريف
        الصحي. يهتم بضمان جودة وسلامة مياه الشرب.

        🔭 الآفاق المستقبلية:
        • شركات توزيع وتوليد المياه الصالحة للشرب
        • هيئات معالجة مياه الصرف الصحي
        • المختبرات البيئية والمائية
        • إدارة الموارد المائية

  utter_description_PEPE_fr:
    - text: |
        💧 Spécialité PEPE (2P2E) — Production et Distribution d'Eau Potable

        Formation professionnelle qui étudie la chimie de l'eau,
        la microbiologie aquatique, l'hydraulique, les techniques
        de traitement de l'eau et les réseaux d'assainissement.
        Garantit la qualité et la sécurité de l'eau potable.

        🔭 Perspectives d'avenir:
        • Sociétés de production et distribution d'eau
        • Stations d'épuration des eaux usées
        • Laboratoires environnementaux et aquatiques
        • Gestion des ressources en eau

  utter_description_ABC_ar:
    - text: |
        🔬 تخصص ABC — التحاليل البيولوجية والكيميائية

        تخصص تطبيقي يجمع بين البيولوجيا والكيمياء التحليلية.
        يدرس تقنيات التحليل المختبري في المجالات الطبية،
        البيئية، والغذائية: الميكروبيولوجيا، الكيمياء التحليلية،
        والبيوكيمياء التطبيقية.

        🔭 الآفاق المستقبلية:
        • المختبرات الطبية والصيدلانية
        • مراقبة البيئة والمياه
        • الصناعة الغذائية والصحية
        • البحث العلمي والأكاديمي

  utter_description_ABC_fr:
    - text: |
        🔬 Spécialité ABC — Analyses Biologiques et Chimiques

        Formation appliquée combinant biologie et chimie analytique.
        Étudie les techniques d'analyses en laboratoire dans les
        domaines médical, environnemental et alimentaire :
        microbiologie, chimie analytique et biochimie appliquée.

        🔭 Perspectives d'avenir:
        • Laboratoires médicaux et pharmaceutiques
        • Contrôle environnemental et qualité des eaux
        • Industries alimentaire et sanitaire
        • Recherche scientifique et académique
