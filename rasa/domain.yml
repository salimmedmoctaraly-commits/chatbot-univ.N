  # ── CNIM ────────────────────────────────────────────
  utter_demander_cnim_ar:
    - text: |
        CNIM – المسابقة الوطنية للمهندسين في موريتانيا:
        • الوسيلة الوحيدة للالتحاق بمدارس المهندسين
        • تنظمها وزارة التعليم العالي والبحث العلمي
        • مساران:
           المسار 1: لطلاب IPGEI والموريتانيين في CPGE الأجنبية
           المسار 2: للطلاب المسجلين في L3 بالجامعات الحكومية
        • المدارس المستهدفة: ESP و IPGEI

  utter_demander_cnim_fr:
    - text: |
        CNIM – Concours National d'Ingénieurs de Mauritanie:
        • Seul moyen d'accès aux cycles d'ingénieurs en Mauritanie
        • Organisé par le Ministère de l'Enseignement Supérieur
        • Deux voies:
           Voie 1: Élèves IPGEI et Mauritaniens des CPGE étrangères
           Voie 2: Étudiants inscrits en L3 dans les établissements publics
        • Écoles visées: ESP et IPGEI

  utter_demander_cnim_voie1_ar:
    - text: |
        CNIM – المسار الأول:
        الشروط:
           • العمر ≤ 26 سنة
           • التحقق من السنة الثانية التحضيرية
           • المشاركة مرة واحدة كحد أقصى
        التسجيل: عبر Framaforms.org
        الوثائق: CIN أو جواز السفر + كشوف نقاط CPGE + استمارة مكتملة

  utter_demander_cnim_voie1_fr:
    - text: |
        CNIM – Voie 1:
        Conditions:
           • Âge ≤ 26 ans
           • Avoir validé la 2ème année préparatoire
           • Maximum une participation au concours
        Inscription: via Framaforms.org
        Dossier: CIN ou passeport + relevés CPGE + formulaire complété

  utter_demander_cnim_voie2_ar:
    - text: |
        CNIM – المسار الثاني (طلاب L3):
        الشروط:
           • العمر ≤ 26 سنة
           • مسجل في L3 بجامعة حكومية
           • من أفضل 10% في الدفعة
           • لم يشارك في المسابقة من قبل
        التسجيل: عبر Framaforms.org

  utter_demander_cnim_voie2_fr:
    - text: |
        CNIM – Voie 2 (Étudiants L3):
        Conditions:
           • Âge ≤ 26 ans
           • Inscrit en L3 dans un établissement public
           • Classé dans les 10% de sa promotion
           • N'avoir jamais participé au concours
        Inscription: via Framaforms.org

  utter_demander_cnim_epreuves_ar:
    - text: |
        اختبارات CNIM (المسار الأول):
        المواد والمعاملات:
           • الرياضيات – معامل 4
           • الفيزياء والكيمياء – معامل 4
           • الفرنسية – معامل 4
           • الإنجليزية – معامل 3
           • الإعلاميات – معامل 3
           • علوم المهندس – معامل 3
        المدارس: ESP (www.esp.mr) | IPGEI (www.ipgei.mr)

