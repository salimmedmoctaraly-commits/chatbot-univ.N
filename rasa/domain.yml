  utter_description_PF_ar:
    - text: |
        ⚛️ **تخصص PF — الفيزياء الأساسية**
        ══════════════════════════════════

        هي فرع من العلوم يهدف إلى فهم القوانين والمبادئ التي تحكم الكون،
        مثل حركة الأجسام، الطاقة، القوى، والمادة.
        وتشمل مجالات مثل الميكانيكا الكلاسيكية، الكهرومغناطيسية،
        الفيزياء الكمية والنسبية.

        🔭 **الآفاق المستقبلية:**
        - تطوير الحواسيب الكمية المعتمدة على ميكانيكا الكم
        - فهم أعمق للكون مثل الثقوب السوداء والطاقة المظلمة
        - تحسين مصادر الطاقة مثل الاندماج النووي
        - تطبيقات متقدمة في الطب والاتصالات

  utter_description_PF_fr:
    - text: |
        ⚛️ **Spécialité PF — Physique Fondamentale**
        ══════════════════════════════════════════

        La physique fondamentale est une branche des sciences qui vise à
        comprendre les lois et les principes qui régissent l'univers, comme
        le mouvement des corps, l'énergie, les forces et la matière.
        Elle inclut des domaines tels que la mécanique classique,
        l'électromagnétisme, la physique quantique et la relativité.

        🔭 **Perspectives d'avenir:**
        - Le développement des ordinateurs quantiques
        - Une compréhension plus profonde de l'univers (trous noirs, énergie noire)
        - L'amélioration des sources d'énergie comme la fusion nucléaire
        - Des applications avancées en médecine et en télécommunications

  utter_description_SP_ar:
    - text: |
        🔬 **تخصص SP — العلوم الفيزيائية**
        ══════════════════════════════════

        هو مجال علمي يدرس القوانين الأساسية التي تحكم الطبيعة،
        مثل الحركة والطاقة والكهرباء والضوء والمادة.
        يعتمد على مواد رئيسية مثل الفيزياء والكيمياء والرياضيات
        لفهم الظواهر الطبيعية وتفسيرها.

        🔭 **الآفاق المستقبلية:**
        - التدريس في المدارس أو الجامعات
        - البحث العلمي في المختبرات
        - العمل في قطاعات الطاقة
        - مجالات الصناعة والتكنولوجيا

  utter_description_SP_fr:
    - text: |
        🔬 **Spécialité SP — Sciences Physiques**
        ══════════════════════════════════════

        La spécialité Sciences Physiques est un domaine scientifique qui étudie
        les lois fondamentales régissant la nature, comme le mouvement, l'énergie,
        l'électricité, la lumière et la matière. Elle s'appuie sur des matières
        principales telles que la physique, la chimie et les mathématiques
        pour comprendre et expliquer les phénomènes naturels.

        🔭 **Perspectives d'avenir:**
        - L'enseignement dans les écoles ou les universités
        - La recherche scientifique en laboratoire
        - Le travail dans les secteurs de l'énergie: électricité, énergie solaire
        - Les domaines de l'industrie et de la technologie

  utter_description_TSER_ar:
    - text: |
        ☀️ **تخصص TSER — تقنيات أنظمة الطاقة المتجددة**
        ═══════════════════════════════════════════════

        تُعد تقنيات الطاقة المتجددة فرعاً من الفيزياء التطبيقية،
        وتشمل حلولاً مبتكرة لتحويل المصادر الطبيعية المستدامة
        إلى كهرباء وحرارة تتجدد باستمرار ولا تنفد،
        مثل الشمس والرياح والمياه والكتلة الحيوية.
        وتتميز بأنها صديقة للبيئة وتقلل من التلوث.

        🔭 **الآفاق المستقبلية:**
        - توليد الكهرباء (محطات شمسية وريّاح)
        - النقل (السيارات الكهربائية والوقود النظيفة)
        - المناطق المعزولة (أنظمة مستقلة أو هجينة)

  utter_description_TSER_fr:
    - text: |
        ☀️ **Spécialité TSER — Technologies des Systèmes d'Energie Renouvelable**
        ══════════════════════════════════════════════════════════════════

        Les technologies des systèmes d'énergie renouvelable sont une branche
        de la physique appliquée et incluent des solutions innovantes pour convertir
        les sources naturelles durables en électricité et en chaleur qui se
        renouvellent continuellement et ne s'épuisent pas, comme le soleil,
        le vent, l'eau et la biomasse. Elles se caractérisent par leur respect
        de l'environnement et par la réduction de la pollution.

        🔭 **Perspectives d'avenir:**
        - La production d'électricité: centrales solaires et éoliennes
        - Le transport: voitures électriques et carburants propres
        - Les zones isolées: systèmes autonomes ou hybrides

  utter_description_EEA_ar:
    - text: |
