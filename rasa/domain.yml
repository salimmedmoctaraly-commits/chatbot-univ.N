  utter_demander_Nuit_Info:
    - text: |
        Nuit de l'Info (ليلة المعلوماتية) هي مسابقة برمجية وطنية فرنسية سنوية مكثفة، تجري على مدار ليلة كاملة من غروب يوم الخميس إلى شروق يوم الجمعة في أوائل ديسمبر.
        إليك أبرز تفاصيلها:
        الهدف: تطوير تطبيق (غالباً لعبة جادة - Serious Game) استجابة لتحديات وموضوعات اجتماعية، تقنية، أو بيئية.
        طبيعة الحدث: عمل جماعي مكثف (Hackathon) يدمج بين التطوير البرمجي والإبداع.
        المشاركون: طلاب الجامعات والمعاهد التكنولوجية (IUT) بشكل أساسي.

        La Nuit de l'Info est un concours national français annuel de programmation intensif.
        Objectif: développer une application (souvent un serious game) en réponse à des problématiques sociales, technologiques ou environnementales.
        Nature: un travail collaboratif intensif (hackathon) combinant développement informatique et créativité.
        Participants: principalement des étudiants issus des universités et des IUT.

