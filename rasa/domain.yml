  utter_greet:
    - text: "أهلاً بك في مساعد جامعة نواكشوط! 👋\nكيف يمكنني مساعدتك؟\n\nBonjour ! Bienvenue dans l'assistant de l'UNA ! Comment puis-je vous aider ?"

  utter_goodbye:
    - text: "وداعاً! نتمنى لك التوفيق 🎓\nAu revoir et bonne chance !"

  utter_affirm:
    - text: "ممتاز! هل تريد مزيداً من المعلومات؟"

  utter_deny:
    - text: "حسناً! هل يمكنني مساعدتك بشيء آخر؟"

  utter_saluer_ar:
    - text: "أهلاً بك في خدمة معلومات جامعة نواكشوط. كيف يمكنني مساعدتك؟"
    - text: "أهلاً وسهلاً بك في جامعة نواكشوط. كيف أستطيع مساعدتك اليوم؟"
    - text: "مرحباً بك في خدمة المعلومات بجامعة نواكشوط. تفضل بطرح سؤالك."
    - text: "حياك الله! أنت الآن في خدمة معلومات جامعة نواكشوط. كيف يمكنني مساعدتك؟"
    - text: "أهلاً بك! يسعدني مساعدتك في كل ما يتعلق بجامعة نواكشوط."

