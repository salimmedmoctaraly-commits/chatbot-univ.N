  utter_ask_identity:
    - text: |
        🤖 أنا مساعد الطالب الجامعي
        جامعة نواكشوط 🎓

        صُممت لمساعدة جميع طلاب كليات
        جامعة نواكشوط:

        🏛️ الكليات:
        • كلية العلوم والتقنيات (FST)
        • كلية الاقتصاد والتسيير (FEG)
        • كلية الحقوق والعلوم السياسية (FSJP)
        • كلية الآداب والعلوم الإنسانية (FLSH)
        • كلية الطب والصيدلة (FMPOS)

        📌 يمكنني مساعدتك في:
        • 📚 معلومات التخصصات
        • 📝 إجراءات التسجيل
        • 🎓 برامج الماستر
        • 📅 الجدول الزمني
        • 💰 المنح الدراسية
        • 🏠 السكن الجامعي

        اسألني عن أي شيء! 😊

    - text: |
        🤖 Je suis l'Assistant Étudiant Virtuel
        de l'Université de Nouakchott 🎓

        Conçu pour aider les étudiants de
        toutes les facultés de l'université :

        🏛️ Facultés :
        • Faculté des Sciences et Techniques (FST)
        • Faculté d'Économie et de Gestion (FEG)
        • Faculté de Droit et Sciences Politiques (FSJP)
        • Faculté des Lettres et Sciences Humaines (FLSH)
        • Faculté de Médecine et de Pharmacie (FMPOS)


        Je peux vous aider avec :
        • 📚 Informations sur les spécialités
        • 📝 Procédures d'inscription
        • 🎓 Programmes de Master
        • 💰 Bourses d'études
        • 🏠 Hébergement universitaire

        Posez-moi n'importe quelle question ! 😊

