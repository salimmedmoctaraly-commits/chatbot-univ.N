  # ── Descriptions spécialités ─────────────────────────

  utter_description_MA_ar:
    - text: |
        📐 **تخصص MA — الرياضيات والتطبيقات**
        ══════════════════════════════════

        يُعدّ تخصص MA من أبرز التخصصات العلمية المعتمدة على الرياضيات.
        يركّز على توظيف الأدوات الرياضية في النمذجة والتحليل
        لفهم الظواهر الواقعية واتخاذ قرارات علمية دقيقة.

        🔭 **الآفاق المستقبلية:**
        - تطوير البرمجيات والأنظمة الذكية
        - تحليل البيانات والإحصاء التطبيقي
        - الذكاء الاصطناعي والنمذجة الرياضية
        - البحث العلمي وحل المشكلات الصناعية والاقتصادية

  utter_description_MA_fr:
    - text: |
        📐 **Spécialité MA — Mathématiques et Applications**
        ══════════════════════════════════════════════

        La spécialité MA compte parmi les principales filières scientifiques
        basées sur les mathématiques. Elle se concentre sur l'utilisation
        des outils mathématiques dans la modélisation et l'analyse
        pour comprendre les phénomènes réels et prendre des décisions
        scientifiques précises.

        🔭 **Perspectives d'avenir:**
        - Développement de logiciels et de systèmes intelligents
        - Analyse de données et statistiques appliquées
        - Intelligence artificielle et modélisation mathématique
        - Recherche scientifique et résolution de problèmes industriels et économiques

  utter_description_MI_ar:
    - text: |
        💻 **تخصص MI — الرياضيات والمعلوماتية**
        ══════════════════════════════════════

        يجمع تخصص MI بين الرياضيات وعلوم الحاسوب،
        ويركّز على الخوارزميات والبرمجة وتطوير الأنظمة،
        مما يؤهّل الطلبة لحل المشكلات برمجياً وتصميم
        حلول رقمية مبتكرة.

        🔭 **الآفاق المستقبلية:**
        - تطوير البرمجيات والأنظمة الذكية
        - تحليل البيانات والإحصاء التطبيقي
        - الذكاء الاصطناعي والنمذجة الرياضية
        - البحث العلمي وحل المشكلات الصناعية والاقتصادية

  utter_description_MI_fr:
    - text: |
        💻 **Spécialité MI — Mathématiques et Informatique**
        ══════════════════════════════════════════════

        La spécialité MI associe les mathématiques et l'informatique,
        et se concentre sur les algorithmes, la programmation et le
        développement de systèmes, ce qui prépare les étudiants à
        résoudre des problèmes par la programmation et à concevoir
        des solutions numériques innovantes.

        🔭 **Perspectives d'avenir:**
        - Développement de logiciels et de systèmes intelligents
        - Analyse de données et statistiques appliquées
        - Intelligence artificielle et modélisation mathématique
        - Recherche scientifique et résolution de problèmes industriels et économiques

  utter_description_MIAGE_ar:
    - text: |
        🖥️ **تخصص MIAGE — طرق المعلوماتية التطبيقية للتسيير**
        ══════════════════════════════════════════════════

        يُعتبر تخصص MIAGE من أهم التخصصات المهنية في الإعلام الآلي،
        إذ يجمع بين الجانب التقني والتطبيقي لإعداد طلاب قادرين على
        تطوير حلول رقمية مبتكرة وربط التكنولوجيا باحتياجات المؤسسات.

        🔭 **الآفاق المستقبلية:**
        - تطوير التطبيقات وأنظمة المعلومات
        - تحليل البيانات والذكاء الاصطناعي
        - ريادة الأعمال الرقمية

  utter_description_MIAGE_fr:
    - text: |
        🖥️ **Spécialité MIAGE — Méthodes Informatiques Appliquées à la Gestion**
        ══════════════════════════════════════════════════════════════════

        Les spécialités MIAGE et DAII font partie des filières professionnelles
        les plus importantes en informatique. Elles allient l'aspect technique
        et pratique afin de former des étudiants capables de développer des
