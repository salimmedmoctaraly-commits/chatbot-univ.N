# ============================================================
# RESPONSES
# ============================================================
responses:

  # ── سلام / وداع ──────────────────────────────────────
  utter_greet:
    - text: "أهلاً بك في مساعد جامعة نواكشوط العصرية! 👋\nكيف يمكنني مساعدتك؟\n\nBonjour ! Bienvenue dans l'assistant de l'UNA ! Comment puis-je vous aider ?"

  utter_goodbye:
    - text: "وداعاً! نتمنى لك التوفيق 🎓\nAu revoir et bonne chance !"

  utter_affirm:
    - text: "ممتاز! هل تريد مزيداً من المعلومات؟"

  utter_deny:
    - text: "حسناً! هل يمكنني مساعدتك بشيء آخر؟"

  utter_saluer_ar:
    - text: "أهلاً بك في خدمة معلومات جامعة نواكشوط العصرية. كيف يمكنني مساعدتك؟"
    - text: "أهلاً وسهلاً بك في جامعة نواكشوط العصرية. كيف أستطيع مساعدتك اليوم؟"
    - text: "مرحباً بك في خدمة المعلومات بجامعة نواكشوط العصرية. تفضل بطرح سؤالك."
    - text: "حياك الله! أنت الآن في خدمة معلومات جامعة نواكشوط العصرية. كيف يمكنني مساعدتك؟"
    - text: "أهلاً بك! يسعدني مساعدتك في كل ما يتعلق بجامعة نواكشوط العصرية."

  utter_saluer_fr:
    - text: "Bonjour ! Bienvenue au service d'information de l'Université de Nouakchott Al-Aasriya. Comment puis-je vous aider ?"
    - text: "Bonjour et bienvenue à l'Université de Nouakchott Al-Aasriya. Que puis-je faire pour vous ?"
    - text: "Bienvenue au service d'information de l'Université de Nouakchott Al-Aasriya. Comment puis-je vous aider aujourd'hui ?"
    - text: "Salut ! Je suis l'assistant virtuel de l'Université de Nouakchott Al-Aasriya. Comment puis-je vous aider ?"
    - text: "Bonjour ! N'hésitez pas à poser votre question sur l'Université de Nouakchott Al-Aasriya."

  utter_au_revoir_ar:
    - text: "مع السلامة! نتمنى لك التوفيق."

  utter_au_revoir_fr:
    - text: "Au revoir ! Bonne chance dans vos études."

  utter_out_of_scope_ar:
    - text: "عذراً، هذا السؤال خارج نطاق اختصاصي. أنا هنا للإجابة على أسئلة حول جامعة نواكشوط العصرية. كيف يمكنني مساعدتك؟"

  utter_out_of_scope_fr:
    - text: "Désolé, cette question dépasse mon domaine. Je suis ici pour les questions sur l'Université de Nouakchott Al-Aasriya. Comment puis-je vous aider ?"

  utter_fallback_ar:
    - text: "عذراً، لم أفهم سؤالك. هل يمكنك إعادة الصياغة؟"

  utter_fallback_fr:
    - text: "Désolé, je n'ai pas bien compris. Pouvez-vous reformuler ?"

  # ── الجامعة ─────────────────────────────────────────
  utter_ask_universite_generale:
    - text: |
        🎓 **جامعة نواكشوط العصرية (UNA)**
        - تأسست سنة 1981 | www.univ-nkc.mr
        - الطلبة: 29,000 (120 دوليون)
        - مدرسون دائمون: 590 | متعاونون: 480
        - 5 كليات | 90 شعبة | 30 بنية بحث

  utter_ask_president:
    - text: |
        🏛️ **رئاسة الجامعة:**
        - الرئيس: د. علي محمد سالم البخاري
        - نائب الرئيس (الأكاديمية): د. محمد الأمين مولاي إبراهيم
        - نائب الرئيس (البحث): د. عليو حمادي باري
        - الأمين العام: د. محمد عبد الجليل ولد احويبيب

  utter_ask_nombre_etudiants:
    - text: "👨‍🎓 عدد الطلاب: **29,000** (منهم 120 دوليون)\n29 000 étudiants dont 120 internationaux."

  utter_ask_nombre_facultes:
    - text: "🏫 **5 كليات** و**90 شعبة تكوين**\n5 facultés | 90 filières de formation"

  utter_ask_centres:
    - text: |
        🏢 **مراكز الجامعة:**
        - مكتبة جامعية
        - مركز تشغيل وتكوين
        - مركز تعليم عن بعد
        - مركز دعم تدريس اللغات
        - 6 مراكز أخرى

  utter_ask_facultes_liste:
    - text: |
        🏛️ **الكليات الخمس:**
        1. كلية الآداب والعلوم الإنسانية (FLSH)
        2. كلية العلوم والتقنيات (FST)
        3. كلية الطب والصيدلة وطب الأسنان (FMPOS)
        4. كلية العلوم القانونية والسياسية (FSJP)
        5. كلية الاقتصاد والتسيير (FEG)

  utter_ask_repartition_etudiants:
    - text: |
        📊 **توزيع الطلاب:**
        - FEG (الاقتصاد): 33.3%
        - FST (العلوم): 27.7%
        - FLSH (الآداب): 17.4%
        - FSJP (القانون): 13%
        - FMPOS (الطب): 8.7%

  # ── FST ─────────────────────────────────────────────
  utter_ask_fst:
    - text: |
        🔬 **كلية العلوم والتقنيات (FST)**
        - العميد: د. دياكانا يعقوبا
        - نائب العميد: د. محمد عبد الودود ولد المحمد
        - الأمين العام: د. محمد حدامين حميدي
        - **20 ليسانس** — 3 سنوات بعد الباك

  utter_ask_fst_licences:
    - text: |
        📋 **شعب FST:**
        **أساسي:** BMP | BOE | GEO | Chimie | SP | PF | EEA | MA | MI
        **مهني:** GEOMIN | NS | TAS-SMQ | TSER | MIAGE | DA2I | PEPE | IPG | ABC

