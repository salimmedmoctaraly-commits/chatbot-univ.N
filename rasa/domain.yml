        السنة الدراسية 2024-2025

        ━━━━━━━━━━━━━━━━━━━
        🔹 **السنة الأولى — L1**
        ━━━━━━━━━━━━━━━━━━━

        ✅ شروط الانتقال العادية:
        • 39 رصيداً + معدل عام 10 بين S1 و S2

        🔄 شروط المداولات الاستثنائية:
        • 39 رصيداً + معدل 9.5 بين S1 و S2
        • أو 36 رصيداً + معدل عام 10 بين الفصلين

        ━━━━━━━━━━━━━━━━━━━
        🔹 **السنة الثانية — L2**
        ━━━━━━━━━━━━━━━━━━━

        ✅ شروط الانتقال العادية:
        • مجموع رصيد 99 + معدل 10 بين S3 و S4
        • وأن يستوفي كل عناصر السنة الأولى

        🔄 شروط المداولات الاستثنائية:
        • الحاصل على 99 رصيداً يستفيد من مداولة عنصر واحد من L1
        • الطالب الذي استوفى كل عناصر L1 ولم يحصل إلا على 96 رصيداً
          + معدل 10 بين S3 و S4 → يستفيد من المداولات والتجاوز إلى L3

        ━━━━━━━━━━━━━━━━━━━
        🔹 **السنة الثالثة — L3**
        ━━━━━━━━━━━━━━━━━━━

        🔄 شروط المداولات:
        • تمنح للطالب فرصة المداولات في عنصرين سواء في L2 أو L3 أو كليهما حتى يتمكن من التخرج

        ⚠️ **ملاحظة عامة:**
        لا يستفيد من المداولات إلا من أجرى امتحان الاستدراك في العنصر المعني ولم يرتكب مخالفات مدة الامتحان

  
