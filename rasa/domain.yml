# ============================================================
# SESSION CONFIG
# ============================================================
session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true

# ============================================================
# SLOTS
# ============================================================
slots:
  language:
    type: categorical
    values:
      - ar
      - fr
    initial_value: ar
    mappings:
      - type: from_intent
        intent: saluer_ar
        value: ar
      - type: from_intent
        intent: saluer_fr
        value: fr

  user_type:
    type: categorical
    values:
      - student
      - visitor
      - staff
    initial_value: visitor
    mappings:
      - type: from_text

# ============================================================
# FORMS
# ============================================================
forms:
  simple_contact_form:
    required_slots:
      - user_type
