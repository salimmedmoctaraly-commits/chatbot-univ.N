  utter_ask_feg_missions:
    - text: |
        🎯 **مهام كلية الاقتصاد والتسيير — Nos Missions**

        1️⃣ ضمان التكوينات الأساسية والمهنية وكذلك التكوين المستمر في المجالات التي تغطيها الكلية وتسليم الشهادات المعترف بها
        Assurer des formations initiales fondamentales et professionnelles ainsi que des formations continues et délivrer des diplômes reconnus et des certifications

        2️⃣ تطوير المعرفة والعلم
        Développer le savoir et la connaissance

        3️⃣ إعداد الخريجين الشباب للاندماج المهني والحياة العملية
        Préparer les jeunes diplômés à l'insertion professionnelle et à la vie active

        4️⃣ تعزيز وتقوية القيم الثقافية العربية والأفريقية
        Promouvoir et renforcer les valeurs culturelles arabes et africaines

        5️⃣ تشجيع البحث العلمي وتقديم خدمات الخبرة في مجالات الكفاءة
        Encourager la recherche scientifique et proposer des prestations de services et expertises dans ses domaines de compétence

  utter_ask_feg_vision:
    - text: |
        🔭 **رؤية كلية الاقتصاد والتسيير — Notre Vision**

        كلية رائدة بفضل جودة برامجها التكوينية والبحثية، في صميم الواقع والشواغل الاجتماعية والاقتصادية الوطنية والإقليمية، منفتحة على المستوى الدولي على التجديدات التكنولوجية والإبداعية، من أجل عالم مستدام.

        Une faculté reconnue par la pertinence et la qualité de ses programmes de formation et de recherche, au cœur des réalités et des préoccupations socioéconomiques nationale et régionale, largement ouverte à l'international, aux innovations technologiques et créatrices, pour un monde durable.

