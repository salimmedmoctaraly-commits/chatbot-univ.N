    - text: "مع السلامة! نتمنى لك التوفيق."

  utter_au_revoir_fr:
    - text: "Au revoir ! Bonne chance dans vos études."

  utter_out_of_scope_ar:
    - text: "عذراً، هذا السؤال خارج نطاق اختصاصي. أنا هنا للإجابة على أسئلة حول جامعة نواكشوط. كيف يمكنني مساعدتك؟"

