  utter_description_CHIMIE_ar:
    - text: |
        🧪 **تخصص الكيمياء**
        ══════════════════

        تخصص الكيمياء هو العلم الذي يدرس المادة وتركيبها وخصائصها
        والتفاعلات التي تحدث بينها. يدرس طلابه كل فروع الكيمياء.
        كما أنه تخصص تجريبي يعتمد على الفهم والتحليل والمختبر.

        🔭 **الآفاق المستقبلية:**
        - البحث العلمي والأكاديمي
        - الصناعة الكيميائية بمختلف مجالاتها
        - المختبرات الطبية والبيئية والجنسائية
        - مجالات الطاقة والتعدين وتحلية المياه

  utter_description_CHIMIE_fr:
    - text: |
        🧪 **Spécialité Chimie**
        ══════════════════════

        C'est la science qui étudie la matière, sa composition, ses propriétés
        et les réactions qui se produisent entre elles. Les étudiants y étudient
        toutes les branches de la chimie. C'est une spécialité expérimentale
        qui repose sur la compréhension, l'analyse et le laboratoire.

        🔭 **Perspectives d'avenir:**
        - Recherche scientifique et académique
        - Industrie chimique dans tous ses domaines
        - Laboratoires médicaux, environnementaux et de police scientifique
        - Domaines de l'énergie, des mines et du dessalement de l'eau


