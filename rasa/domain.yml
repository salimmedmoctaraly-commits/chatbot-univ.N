        • جيولوجيا: MINE، GEOLOGIE، 2E
        • رياضيات/إحصاء: MA_IMCS، SDD

  utter_demander_masters_fr:
    - text: |
        Masters à la FST:
        • Biologie: BEE3, BMPB, BOMVRH, TASSMQ, NS
        • Chimie/Physique: SN, MATERIAUX, 2M, ER
        • Informatique: IA_MLDS, IA_NLPCV, ISDR_SI, ISDR_RSC
        • Géologie: MINE, GEOLOGIE, 2E
        • Mathématiques/Stats: MA_IMCS, SDD

  utter_demander_doctorat_ar:
    - text: |
        الدكتوراه في FST:
        • التخصصات: البيولوجيا، الفيزياء، الكيمياء، الجيولوجيا، الرياضيات، المعلوماتية
        • الشروط: ماستر أو ما يعادله (Bac+5)
        • المدة: 3 سنوات بعد الماستر (Bac+8)

  utter_demander_doctorat_fr:
    - text: |
        Doctorat à la FST:
        • Spécialités: Biologie, Physique, Chimie, Géologie, Mathématiques, Informatique
        • Conditions: Master ou équivalent (Bac+5)
        • Durée: 3 ans après le master (Bac+8)



